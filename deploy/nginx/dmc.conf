server {
    listen 80;
    server_name _; # Accepte l'IP directement

    # =========================================================================
    # RACINE DU SITE
    # =========================================================================
    root /var/www/dmc/public;
    index index.php index.html;

    # =========================================================================
    # LOGS
    # =========================================================================
    access_log /var/log/nginx/dmc_access.log;
    error_log /var/log/nginx/dmc_error.log;

    # =========================================================================
    # SÉCURITÉ - Headers
    # =========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # =========================================================================
    # TAILLE MAX UPLOAD (images produits, etc.)
    # =========================================================================
    client_max_body_size 50M;

    # =========================================================================
    # GESTION DES REQUÊTES
    # =========================================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =========================================================================
    # PHP-FPM
    # =========================================================================
    location ~ \.php$ {
        # Sur AlmaLinux, le socket par défaut est /run/php-fpm/www.sock
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeouts pour les requêtes longues
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # =========================================================================
    # ASSETS STATIQUES - Cache long
    # =========================================================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Assets Vite (avec hash, cache très long)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # =========================================================================
    # SÉCURITÉ - Bloquer les fichiers sensibles
    # =========================================================================
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }
}
