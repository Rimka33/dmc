server {
    listen 80;
    server_name __VOTRE_DOMAINE__ www.__VOTRE_DOMAINE__;

    # Redirection HTTP -> HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name __VOTRE_DOMAINE__ www.__VOTRE_DOMAINE__;

    # =========================================================================
    # SSL (Let's Encrypt - sera configuré via Certbot)
    # =========================================================================
    ssl_certificate /etc/letsencrypt/live/__VOTRE_DOMAINE__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__VOTRE_DOMAINE__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # =========================================================================
    # RACINE DU SITE
    # =========================================================================
    root /var/www/dmc/public;
    index index.php index.html;

    # =========================================================================
    # LOGS
    # =========================================================================
    access_log /var/log/nginx/dmc_access.log;
    error_log /var/log/nginx/dmc_error.log;

    # =========================================================================
    # SÉCURITÉ - Headers
    # =========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =========================================================================
    # TAILLE MAX UPLOAD (images produits, etc.)
    # =========================================================================
    client_max_body_size 50M;

    # =========================================================================
    # GESTION DES REQUÊTES
    # =========================================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =========================================================================
    # PHP-FPM
    # =========================================================================
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeouts pour les requêtes longues
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # =========================================================================
    # ASSETS STATIQUES - Cache long
    # =========================================================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Assets Vite (avec hash, cache très long)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # =========================================================================
    # SÉCURITÉ - Bloquer les fichiers sensibles
    # =========================================================================
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }
}
